<!DOCTYPE html>
<html>
<head>
    <title>SMS Spam Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>📩 SMS Spam Detection</h1>
        <p class="tagline">Vintage Intelligence. Modern Protection.</p>

        <!-- FORM -->
        <form method="POST">
            <!-- IMPORTANT: textarea is EMPTY after submit -->
            <textarea 
                name="message" 
                rows="4" 
                placeholder="Enter your SMS here..." 
                required></textarea>

            <button type="submit">Analyze Message</button>
        </form>

        <!-- RESULT SECTION -->
        {% if prediction %}
        <div class="result fade-in">

            <!-- Prediction -->
            <div class="{% if 'Spam' in prediction %}spam{% else %}ham{% endif %}">
                {{ prediction }}
            </div>

            <!-- Confidence -->
            <div class="confidence">
                Confidence: {{ confidence }}%
            </div>

            <!-- Entered SMS (NOT a textarea anymore) -->
            <div class="input-text">
                <strong>Entered SMS:</strong>
                <p class="entered-message">
                    {{ message }}
                </p>
            </div>

        </div>
        {% endif %}

    </div>
</body>
</html>
